<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px;
        line-height: 1.6;
        background: #f6f8fb;
        color: #1f2937;
      }
      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .hint {
        color: #4b5563;
      }
      .status {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #e0f2fe;
        color: #075985;
        font-size: 14px;
      }
      form {
        margin-top: 24px;
      }
      input[type="file"] {
        margin-bottom: 16px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        background: #0f766e;
        color: white;
        cursor: pointer;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{ app_name }}</h1>
      <p class="hint">
        Upload a CSV file with the columns <code>date</code>, <code>region</code>,
        <code>product</code>, <code>units_sold</code>, and <code>unit_price</code>.
      </p>
      <p class="status">Environment: {{ environment }}</p>

      <form action="/reports/sales/view" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv" required />
        <br />
        <button type="submit">Generate Sales Report</button>
      </form>
    </div>
  </body>
</html>
